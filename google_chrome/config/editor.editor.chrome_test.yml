langcode: en
status: true
dependencies:
  config:
    - filter.format.chrome_test
  module:
    - ckeditor5
    - browser_ai_ckeditor
format: chrome_test
editor: ckeditor5
settings:
  toolbar:
    items:
      - heading
      - undo
      - redo
      - bold
      - italic
      - bulletedList
      - blockQuote
      - numberedList
      - link
      - drupalInsertImage
      - '|'
      - aiProofread
      - aiWriteForMe
      - aiSummarize
  plugins:
    ckeditor5_heading:
      enabled_headings:
        - heading2
        - heading3
        - heading4
        - heading5
        - heading6
    ckeditor5_imageResize:
      allow_resize: true
    ckeditor5_list:
      properties:
        reversed: true
        startIndex: true
      multiBlock: true
image_upload:
  status: false

  field_blog_post:
    -
      value: '<h2>Getting started with testing the Chrome Browser</h2><p>The first step is to login using the username admin and the password admin.</p><p>After that you can click on "Content" in the menu and you will see all available content. You may now create a new Blogpost</p><p>In the image field you can upload an image and test the alt text image function.</p><p>In the blog post you can play around with the browser buttons on the right and write some text.</p><p>In the Summary field you have the "Summarize with Google Chrome Provider" button you can use to Summarize the content.</p><p>After you save, there is a "Translate" tab, inside this you can click Translate with Chrome, to translate the content to French.</p><p>If you want to add more languages, use Configuration -&gt; Region and language -&gt; Languages</p>'
      format: chrome_test

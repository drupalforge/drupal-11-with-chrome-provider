type: drupal11
docroot: web
php_version: "8.3"
webserver_type: apache-fpm
xdebug_enabled: false
additional_hostnames: []
additional_fqdns: []
database:
    type: mysql
    version: "8.0"
hooks:
    post-start:
        # Set up debugging.
        - exec: test -f .vscode/launch.json || mkdir -p .vscode && cp .ddev/launch.json .vscode/
        # Run initial setup tasks.
        - exec: .devpanel/init.sh
use_dns_when_possible: true
composer_version: "2"
disable_settings_management: true
web_environment:
    # Set up DevPanel variables.
    - APACHE_RUN_USER=$DDEV_USER
    - APACHE_RUN_GROUP=dialout
    - APP_ROOT=$DDEV_COMPOSER_ROOT
    - WEB_ROOT=$DDEV_COMPOSER_ROOT/$DDEV_DOCROOT
    - DB_HOST=db
    - DB_PORT=3306
    - DB_USER=db
    - DB_PASSWORD=db
    - DB_NAME=db
    - DP_APP_ID=drupal-11-with-chrome-provider
    - DB_DRIVER=mysql
    - DEBUG_SCRIPT=1
corepack_enable: false
